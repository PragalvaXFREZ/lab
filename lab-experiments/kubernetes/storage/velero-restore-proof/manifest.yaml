apiVersion: v1
kind: Namespace
metadata:
  name: velero-cap-proof
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: proof-data
  namespace: velero-cap-proof
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 16Mi
  storageClassName: longhorn
---
apiVersion: v1
kind: Pod
metadata:
  name: proof-reader
  namespace: velero-cap-proof
  annotations:
    backup.velero.io/backup-volumes: data
spec:
  restartPolicy: Always
  containers:
    - name: reader
      image: alpine:3.22
      command:
        - sh
        - -c
        - sleep 1d
      resources:
        requests:
          cpu: 5m
          memory: 8Mi
        limits:
          memory: 32Mi
      volumeMounts:
        - name: data
          mountPath: /data
  volumes:
    - name: data
      persistentVolumeClaim:
        claimName: proof-data
