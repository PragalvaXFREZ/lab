apiVersion: v1
kind: Pod
metadata:
  name: loki-forward-copy
  namespace: logging
spec:
  restartPolicy: Never
  nodeSelector:
    kubernetes.io/hostname: talos-opt-7040
  containers:
    - name: copy
      image: alpine:3.22
      command:
        - sh
        - -c
        - sleep 1d
      resources:
        requests:
          cpu: 10m
          memory: 16Mi
        limits:
          memory: 64Mi
      volumeMounts:
        - name: source
          mountPath: /source
          readOnly: true
        - name: destination
          mountPath: /destination
  volumes:
    - name: source
      persistentVolumeClaim:
        claimName: loki-longhorn-staging
    - name: destination
      persistentVolumeClaim:
        claimName: storage-loki-0
