apiVersion: v1
kind: Namespace
metadata:
  name: longhorn-proof
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: longhorn-proof
  namespace: longhorn-proof
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
  storageClassName: longhorn
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: longhorn-proof
  namespace: longhorn-proof
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: longhorn-proof
  template:
    metadata:
      labels:
        app: longhorn-proof
    spec:
      nodeSelector:
        kubernetes.io/hostname: talos-lqv-w4u
      securityContext:
        fsGroup: 65534
        runAsGroup: 65534
        runAsNonRoot: true
        runAsUser: 65534
        seccompProfile:
          type: RuntimeDefault
      terminationGracePeriodSeconds: 5
      containers:
        - name: proof
          image: busybox:1.37
          command:
            - sh
            - -c
            - sleep 7d
          resources:
            requests:
              cpu: 5m
              memory: 8Mi
            limits:
              memory: 32Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: longhorn-proof
