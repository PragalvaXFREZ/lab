name: publisher image

on:
  push:
    branches: [main]
    paths:
      - "kubernetes/apps/showcase/snapshot-publisher/image/**"
      - ".github/workflows/publisher-image.yaml"
  workflow_dispatch: {}

env:
  IMAGE: ghcr.io/pragalvaxfrez/snapshot-publisher
  # Bump together with the image pin in
  # kubernetes/apps/showcase/snapshot-publisher/cronjob.yaml.
  VERSION: 0.1.0

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    name: build and push the publisher image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: kubernetes/apps/showcase/snapshot-publisher/image
          push: true
          tags: ${{ env.IMAGE }}:${{ env.VERSION }}
