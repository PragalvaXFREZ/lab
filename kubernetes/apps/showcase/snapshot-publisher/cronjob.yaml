# Born suspended, enabled after the first manual run was verified end to end
# (render, schema gate, leak grep, push all eyeballed on 2026-07-06). A manual
# run can still be fired anytime with
#   kubectl create job snap-manual --from=cronjob/snapshot-publisher -n showcase
# Every non-default line is a decision: hourly because each commit is one cell
# of the uptime ledger the portfolio renders, Forbid because two publishers
# must not race a git push, startingDeadlineSeconds because a cluster that
# sleeps for two days must not wedge the CronJob permanently, backoffLimit 1
# because the next hourly tick is the retry, Never so failed pods keep their
# logs, activeDeadlineSeconds so a hung push cannot block every later run.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: snapshot-publisher
  namespace: showcase
spec:
  schedule: "0 * * * *"
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 600
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 2
  jobTemplate:
    spec:
      backoffLimit: 1
      activeDeadlineSeconds: 600
      template:
        spec:
          serviceAccountName: snapshot-publisher
          restartPolicy: Never
          containers:
            - name: publish
              image: ghcr.io/pragalvaxfrez/snapshot-publisher:0.1.0
              command: ["/bin/sh", "/scripts/publish.sh"]
              resources:
                requests:
                  cpu: 50m
                  memory: 64Mi
                limits:
                  memory: 256Mi
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop: ["ALL"]
                seccompProfile:
                  type: RuntimeDefault
              volumeMounts:
                - name: scripts
                  mountPath: /scripts
                - name: schema
                  mountPath: /schema
                - name: credentials
                  mountPath: /credentials
          volumes:
            - name: scripts
              configMap:
                name: snapshot-publisher-scripts
            - name: schema
              configMap:
                name: snapshot-schema-v1
            - name: credentials
              secret:
                secretName: snapshot-push-credential
                defaultMode: 0400
