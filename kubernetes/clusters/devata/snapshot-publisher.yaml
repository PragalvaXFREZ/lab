# Automation was off at birth, the same drill as every adoption: the root
# app created this child, the first sync was manual, and the first publish
# run was verified end to end (2026-07-06) before prune and selfHeal came on.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: snapshot-publisher
  namespace: argocd
  labels:
    devata.pragalva.me/tier: workload
spec:
  project: default
  source:
    repoURL: https://github.com/PragalvaXFREZ/lab.git
    targetRevision: main
    path: kubernetes/apps/showcase/snapshot-publisher
  destination:
    server: https://kubernetes.default.svc
    namespace: showcase
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
