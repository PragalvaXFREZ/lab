apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nvidia-device-plugin
  namespace: argocd
  labels:
    devata.pragalva.me/tier: platform
spec:
  project: default
  sources:
    - repoURL: https://nvidia.github.io/k8s-device-plugin
      chart: nvidia-device-plugin
      targetRevision: 0.19.3  # pinned to the running release; upgrading is editing this line
      helm:
        valueFiles:
          - $values/kubernetes/infra/controllers/nvidia-device-plugin/values.yaml
    - repoURL: https://github.com/PragalvaXFREZ/lab.git
      targetRevision: main
      ref: values
    - repoURL: https://github.com/PragalvaXFREZ/lab.git
      targetRevision: main
      path: kubernetes/infra/controllers/nvidia-device-plugin/runtimeclass
  destination:
    server: https://kubernetes.default.svc
    namespace: nvidia-device-plugin
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    automated:
      selfHeal: true
      prune: true
