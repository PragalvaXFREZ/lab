# Machine-specific patch for the Acer Nitro 5 worker.
# The Longhorn data directory stays inside the existing EPHEMERAL volume.
# This patch does not repartition or wipe the disk.
machine:
  nodeLabels:
    node-role.kubernetes.io/worker: ""
    node.longhorn.io/create-default-disk: "true"
  install:
    disk: /dev/nvme0n1
    image: 192.168.1.13:5000/installer/efa8c0e85481aa31a86731108885dd6ea5ef0f099facfd928a6f738f1a242610:v1.11.5
    wipe: false
  kubelet:
    extraMounts:
      - destination: /var/mnt/longhorn
        type: bind
        source: /var/mnt/longhorn
        options:
          - bind
          - rshared
          - rw
  kernel:
    modules:
      - name: nvidia
        parameters:
          - NVreg_EnableGpuFirmware=0
      - name: nvidia_uvm
      - name: nvidia_drm
      - name: nvidia_modeset
  sysctls:
    net.core.bpf_jit_harden: "1"
  network:
    hostname: talos-lqv-w4u
    interfaces:
      - interface: enp3s0
        addresses:
          - 192.168.1.9/24
        routes:
          - network: 0.0.0.0/0
            gateway: 192.168.1.1
        dhcp: false
    nameservers:
      - 192.168.1.1
      - 1.1.1.1
  registries:
    mirrors:
      192.168.1.13:5000:
        endpoints:
          - http://192.168.1.13:5000
cluster:
  controlPlane:
    endpoint: https://192.168.1.8:6443
