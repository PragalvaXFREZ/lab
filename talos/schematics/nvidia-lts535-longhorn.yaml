# Talos Image Factory schematic for the Acer Nitro 5 worker.
# It preserves the LTS NVIDIA experiment and adds the tools required by
# Longhorn V1 on Talos.
customization:
  systemExtensions:
    officialExtensions:
      - siderolabs/nonfree-kmod-nvidia-lts
      - siderolabs/nvidia-container-toolkit-lts
      - siderolabs/iscsi-tools
      - siderolabs/util-linux-tools

