# Talos Image Factory schematic for storage-capable Intel bare-metal nodes.
# The Longhorn extensions are installed now so adding replicated storage later
# does not require another operating-system image transition on this node.
customization:
  systemExtensions:
    officialExtensions:
      - siderolabs/intel-ucode
      - siderolabs/iscsi-tools
      - siderolabs/util-linux-tools

